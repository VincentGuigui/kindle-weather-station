# Kindle Weather Stand - configuration
# Edit these values, save, then run "Kindle Weather Stand" from KUAL again.
# Lines starting with # are comments. Format is:  key = value

# Weather data source:  openweathermap  or  meteofrance
#   openweathermap - worldwide coverage, ~5 day forecast, REQUIRES a free api_key (below),
#                    and needs the bundled pytz library.
#   meteofrance    - Meteo-France AROME/ARPEGE models served by Open-Meteo. No API key and
#                    no pytz needed; best accuracy for France & neighbours; forecast limited
#                    to 4 days. Requires lat/lon in "location" below.
provider = openweathermap

# Layout (currently only for provider = meteofrance):
#   portrait  - 600x800 stat layout (default), fills weather-template.svg
#   landscape - 800x600 hourly temperature chart, fills weather-template-landscape.svg
layout = portrait

# OpenWeatherMap API key  (only used when provider = openweathermap)
# Get a free one at https://openweathermap.org/api
api_key = ffffffffffffffffffffffffffffffff

# Location - choose ONE form:
#   lat=  NN.NN&lon=NN.NN (coordinates - most reliable; REQUIRED for meteofrance)
#   q=    city name,ISO country code     (openweathermap only)
#   id=   XXXXX (OpenWeatherMap city id)  (openweathermap only)
location = lat=40.0&lon=1.0

# Units:  metric (degrees C, m/s)  or  imperial (degrees F, mph)
units = metric

# Time format:  24  (23:59)  or  12  (11:59PM)
time_format = 24

# Timezone - https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone = Europe/Paris

# Condition-text language (meteofrance only):  en (English)  or  fr (French)
language = en
