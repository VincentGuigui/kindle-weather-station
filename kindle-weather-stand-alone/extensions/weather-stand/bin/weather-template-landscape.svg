<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="600" height="800">
	<!-- Kindle Weather Project - landscape layout, authored in 800x600 then rotated 90 deg -->
	<!-- into a 600x800 canvas so it fills the portrait e-ink panel; turn the Kindle to read. -->
	<!-- (If it comes out upside down, swap the transform to: rotate(-90) translate(-800,0).) -->
	<!-- Weather icon definitions are injected from weather-template.svg by the generator. -->
	<!-- SVG artwork and weather icons included in this project are licensed under CC0. -->
	VAR_ICON_DEFS

	<g transform="translate(600,0) rotate(90)">

	<!-- ===== header (now icon + temperature) ===== -->
	<g transform="translate(20,15)">
		<g transform="scale(0.80)"><use xlink:href="#VAR_NOW_ICON"/></g>
		<text style="text-anchor:start;" font-size="80px" x="100" y="65">VAR_NOW_TEMP&#176;</text>
	</g>
	<text style="text-anchor:end;" font-size="35px" x="780" y="35">VAR_TODAY_COND</text>
	<text style="text-anchor:end;" font-size="35px" x="780" y="75">VAR_TODAY_HIGH&#176; / VAR_TODAY_LOW&#176; / VAR_NOW_PRESSURE hPa</text>

	<!-- ===== hourly temperature chart (icons row, then curve down to the x-axis) ===== -->
	<g transform="translate(-20,0)">
		<line x1="70" y1="415" x2="770" y2="415" stroke="#000000" stroke-width="1.5"/>
		<g>VAR_CHART_OVERLAY</g>
	</g>
	
	<!-- ===== tomorrow's condition, then the next-days forecast (shifted 45px down) ===== -->
	<g transform="translate(24,490) scale(0.70)"><use xlink:href="#VAR_DAILY_TOM_ICON"/></g>
	<text style="text-anchor:start;" font-size="30px" x="24" y="485">VAR_DAILY_TOM_COND</text>
	<g transform="translate(110,0)">
		<text style="text-anchor:start;" font-size="30px" x="0" y="520">VAR_DAILY_TOM_DAY</text>
		<text style="text-anchor:start;" font-size="30px" x="0" y="555">VAR_DAILY_TOM_HIGH&#176; / VAR_DAILY_TOM_LOW&#176;</text>
	</g>
	<g transform="translate(290,500) scale(0.55)"><use xlink:href="#VAR_DAILY_1_ICON"/></g>
	<text style="text-anchor:start;" font-size="30px" x="352" y="520">VAR_DAILY_1_DAY</text>
	<text style="text-anchor:start;" font-size="30px" x="352" y="555">VAR_DAILY_1_HIGH&#176; / VAR_DAILY_1_LOW&#176;</text>
	<g transform="translate(550,500) scale(0.55)"><use xlink:href="#VAR_DAILY_2_ICON"/></g>
	<text style="text-anchor:start;" font-size="30px" x="612" y="520">VAR_DAILY_2_DAY</text>
	<text style="text-anchor:start;" font-size="30px" x="612" y="555">VAR_DAILY_2_HIGH&#176; / VAR_DAILY_2_LOW&#176;</text>




	<!-- ===== Footer ===== -->
	<g transform="translate(15,570)">
	  <path d="M 3.688 0.59 L 6.312 0.59 C 6.795 0.59 7.187 0.944 7.187 1.38 L 7.187 2.564 L 8.5 2.564 C 8.983 2.564 9.375 2.918 9.375 3.354 L 9.375 13.62 C 9.375 14.055 8.983 14.409 8.5 14.409 L 1.5 14.409 C 1.017 14.409 0.625 14.055 0.625 13.62 L 0.625 3.354 C 0.625 2.918 1.017 2.564 1.5 2.564 L 2.813 2.564 L 2.813 1.38 C 2.813 0.944 3.205 0.59 3.688 0.59 Z" 
	  style="stroke: rgb(0, 0, 0); fill: #cccccc;stroke-width: 2px;" />
	</g>
	<text style="text-anchor:start;" font-size="20px" x="30" y="585">VAR_BATTERY_CAPACITY</text>
	<text style="text-anchor:end;" font-size="16px" x="780" y="585">VAR_PROVIDER_STRING |v.VAR_VERSION | VAR_UPDATE_TIME | VAR_LOCATION</text>
	</g>
</svg>
